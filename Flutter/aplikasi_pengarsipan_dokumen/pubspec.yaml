name: document_archiver
description: Document Archiver - Personal Document Management System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: ">=3.24.0"

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # File handling
  file_picker: ^8.0.3
  path_provider: ^2.1.3

  # UI & Fonts
  google_fonts: ^6.2.1
  flutter_slidable: ^3.1.0

  # Charts
  fl_chart: ^0.68.0

  # Utils
  intl: ^0.19.0
  uuid: ^4.5.0

  # Preview
  open_filex: ^4.5.2
  supabase_flutter: ^2.12.2
  dio: ^5.9.2
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  uuid: ^4.4.0
  path_provider: ^2.1.4

flutter:
  uses-material-design: true
